name: .NET

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration ${{ matrix.configuration }} --no-restore

      - name: Check formatting
        if: matrix.configuration == 'Release'
        run: dotnet format --verify-no-changes --no-restore

      - name: Test
        run: dotnet test --configuration ${{ matrix.configuration }} --no-build --verbosity normal

      - name: Publish
        if: matrix.configuration == 'Release'
        run: dotnet publish src\DesktopPet.App\DesktopPet.App.csproj --configuration Release --no-build --output ${{ github.workspace }}\publish

      - name: Upload artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: DesktopPet-${{ github.sha }}
          path: ${{ github.workspace }}\publish
