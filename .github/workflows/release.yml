name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish src\DesktopPet.App\DesktopPet.App.csproj --configuration Release --no-build --self-contained --output ${{ github.workspace }}\publish

      - name: Zip artifact
        run: Compress-Archive -Path "${{ github.workspace }}\publish\*" -DestinationPath "${{ github.workspace }}\DesktopPet-${{ github.ref_name }}.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.workspace }}\DesktopPet-${{ github.ref_name }}.zip
          generate_release_notes: true
